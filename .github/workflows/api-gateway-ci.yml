name: api-gateway CI

on:
  push:
    branches: [dev]
    paths: [api-gateway/**]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: api-gateway

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api-gateway/go.mod
          cache-dependency-path: api-gateway/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1

      - name: Verify golangci-lint installation
        run: golangci-lint --version

      - name: Run golangci-lint
        run: golangci-lint run 

      - run: make test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names api-gateway \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push sha-tagged image
        uses: docker/build-push-action@v6
        with:
          context: api-gateway
          push: true
          tags: ${{ steps.ecr.outputs.url }}:sha-${{ github.sha }}

      - name: Update ArgoCD values-dev.yaml
        env:
          ARGOCD_REPO_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${ARGOCD_REPO_TOKEN}@github.com/huzaifa678/SAAS-Continious-Delivery.git /tmp/cd
          cd /tmp/cd

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq -i '.image.apiGateway = "${{ steps.ecr.outputs.url }}:sha-${{ github.sha }}"' saas-chart/values-dev.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add saas-chart/values-dev.yaml
          git commit -m "ci(api-gateway): deploy sha-${{ github.sha }} to dev"
          git push
