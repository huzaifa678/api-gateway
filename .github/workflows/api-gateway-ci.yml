name: api-gateway CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths: [api-gateway/**]
  pull_request:
    branches: [test, main]
    paths: [api-gateway/**]

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/api-gateway

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-gateway

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api-gateway/go.mod
          cache-dependency-path: api-gateway/go.sum

      - run: make test

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: get ECR URL
        id: ecr
        run: |
          ECR_URL=$(aws ecr describe-repositories --repository-names api-gateway \
            --query 'repositories[0].repositoryUri' --output text)
          echo "url=$ECR_URL" >> $GITHUB_OUTPUT

      - uses: aws-actions/amazon-ecr-login@v2

      - name: build & push image
        uses: docker/build-push-action@v6
        with:
          context: api-gateway
          push: true
          tags: ${{ steps.ecr.outputs.url }}:${{ github.sha }}
